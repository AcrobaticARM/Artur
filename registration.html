<!DOCTYPE html>
<html lang="hy">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Գրանցում</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .form-container {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        button:hover {
            background-color: #218838;
        }

        button:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <div class="form-container">
        <h2>Երեխայի Գրանցման Ձև</h2>
        <form id="registrationForm">

            <div class="form-group">
                <label for="childName">Երեխայի Անուն *</label>
                <input type="text" id="childName" required placeholder="Անուն">
            </div>

            <div class="form-group">
                <label for="childSurname">Երեխայի Ազգանուն *</label>
                <input type="text" id="childSurname" required placeholder="Ազգանուն">
            </div>

            <div class="form-group">
                <label for="childDob">Ծննդյան Ամսաթիվ *</label>
                <input type="date" id="childDob" required>
            </div>

            <div class="form-group">
                <label for="parentName">Ծնողի Անուն Ազգանուն *</label>
                <input type="text" id="parentName" required placeholder="Անուն Ազգանուն">
            </div>

            <div class="form-group">
                <label for="phone">Հեռախոսահամար *</label>
                <input type="tel" id="phone" required placeholder="+374 XXXXXXXX">
            </div>

            <div class="form-group">
                <label for="phone2">Հեռախոսահամար 2</label>
                <input type="tel" id="phone2" placeholder="+374 XXXXXXXX">
            </div>

            <div class="form-group">
                <label for="address">Հասցե *</label>
                <input type="text" id="address" required placeholder="Հասցե">
            </div>

            <div class="form-group">
                <label for="photoFile">Կցել Նկար *</label>
                <input type="file" id="photoFile" accept="image/*" required>
            </div>

            <button type="submit" id="submitBtn">Գրանցվել</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Քո Firebase կոնֆիգուրացիան
        const firebaseConfig = {
            apiKey: "AIzaSyAPguplFnBe6Yy9QNeb3DJwt9qFydFNcA4",
            authDomain: "acrobatic-5c3b5.firebaseapp.com",
            projectId: "acrobatic-5c3b5",
            storageBucket: "acrobatic-5c3b5.firebasestorage.app",
            messagingSenderId: "342555745751",
            appId: "1:342555745751:web:ea3b23ff8855fa52c8ff92",
            measurementId: "G-BSVEYYC0P5"
        };

        // Ինիցիալիզացիա Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Քո Cloudinary հաշվի պատրաստի տվյալները
        const CLOUDINARY_CLOUD_NAME = "dhxhjvoc7";
        const CLOUDINARY_UPLOAD_PRESET = "z9r54n9z";

        const form = document.getElementById('registrationForm');

        // --- Նկարի սեղմման/փոքրացման ֆունկցիա (Client-side resize) ---
        // Մինչ Cloudinary ուղարկելը՝ նկարը locally փոքրացնում ենք max 1000px
        // լայնության/բարձրության, որպեսզի admin-ը ամեն օր արագ բացի ցուցակը,
        // և 4K (8-25MB) նկարները չծանրացնեն ոչ բեռնումը, ոչ Cloudinary-ի
        // անվճար sторeջ/bandwidth-ը 200 երեխայի դեպքում:
        function resizeImage(file, maxSize = 1000, quality = 0.8) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                const reader = new FileReader();

                reader.onload = (e) => {
                    img.src = e.target.result;
                };
                reader.onerror = reject;

                img.onload = () => {
                    let { width, height } = img;

                    if (width > height) {
                        if (width > maxSize) {
                            height = Math.round(height * (maxSize / width));
                            width = maxSize;
                        }
                    } else {
                        if (height > maxSize) {
                            width = Math.round(width * (maxSize / height));
                            height = maxSize;
                        }
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    canvas.toBlob((blob) => {
                        if (!blob) {
                            reject(new Error("Նկարը հնարավոր չեղավ սեղմել"));
                            return;
                        }
                        resolve(blob);
                    }, 'image/jpeg', quality);
                };

                img.onerror = () => reject(new Error("Նկարը հնարավոր չեղավ բացել"));

                reader.readAsDataURL(file);
            });
        }

        // Ֆորմայի ուղարկում (Cloudinary + Firestore)
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = "Ուղարկվում է...";

            const file = document.getElementById('photoFile').files[0];

            try {
                let photoUrl = "";

                // Նկարի բեռնում Cloudinary (նախապես սեղմված/փոքրացված)
                if (file) {
                    submitBtn.textContent = "Նկարը մշակվում է...";
                    const resizedBlob = await resizeImage(file, 1000, 0.8);

                    submitBtn.textContent = "Ուղարկվում է...";
                    const cloudinaryData = new FormData();
                    cloudinaryData.append("file", resizedBlob, "photo.jpg");
                    cloudinaryData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);

                    const cloudinaryResponse = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, {
                        method: "POST",
                        body: cloudinaryData
                    });

                    if (!cloudinaryResponse.ok) {
                        throw new Error("Նկարը հնարավոր չեղավ բեռնել Cloudinary:");
                    }

                    const cloudinaryResult = await cloudinaryResponse.json();
                    // Լրացուցիչ՝ Cloudinary-ի կողմից webp/auto-quality optimization
                    // (admin panel-ում thumbnail-ը 50x50px circle է, ուստի սա բավարար է)
                    photoUrl = cloudinaryResult.secure_url.replace("/upload/", "/upload/f_webp,q_auto/");
                }

                // Տվյալների պատրաստում Firestore-ի համար
                const formData = {
                    childName: document.getElementById('childName').value,
                    childSurname: document.getElementById('childSurname').value,
                    childDob: document.getElementById('childDob').value,
                    parentName: document.getElementById('parentName').value,
                    phone: document.getElementById('phone').value,
                    phone2: document.getElementById('phone2').value,
                    address: document.getElementById('address').value,
                    photoUrl: photoUrl,
                    createdAt: new Date()
                };

                // Պահպանում Firestore-ում ("registrations" հավաքածու)
                await addDoc(collection(db, "registrations"), formData);

                alert("Տվյալները հաջողությամբ պահպանվեցին դպրոցի բազայում:");

                // Ֆորմայի մաքրում հաջող ավարտից հետո
                form.reset();

            } catch (error) {
                console.error("Սխալ տեղի ունեցավ: ", error);
                alert("Գրանցման սխալ. " + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Գրանցվել";
            }
        });
    </script>

</body>

</html>
